<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>武大美食生活地图 💕</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e74c3c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WHU生活" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet Gesture Handling -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.css" />

  <link rel="stylesheet" href="css/style.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💕</text></svg>">
</head>
<body>

  <!-- ====== Top Bar ====== -->
  <header id="top-bar">
    <h1 id="site-title">💕 武大生活地图</h1>
    <div id="search-box">
      <input type="text" id="search-input" placeholder="搜索地点、美食、设施..." autocomplete="off" />
      <button id="search-clear" title="清除">&times;</button>
    </div>
    <div id="search-results" class="hidden"></div>
  </header>

  <!-- ====== Category Filter Sidebar ====== -->
  <aside id="category-bar">
    <button class="cat-btn active" data-type="all">
      <span class="cat-icon">📍</span>
      <span class="cat-label">全部</span>
      <span class="cat-count" id="count-all">0</span>
    </button>
    <button class="cat-btn" data-type="food">
      <span class="cat-icon">🍜</span>
      <span class="cat-label">美食</span>
      <span class="cat-count" id="count-food">0</span>
    </button>
    <button class="cat-btn" data-type="shopping">
      <span class="cat-icon">🛒</span>
      <span class="cat-label">购物</span>
      <span class="cat-count" id="count-shopping">0</span>
    </button>
    <button class="cat-btn" data-type="service">
      <span class="cat-icon">🏪</span>
      <span class="cat-label">生活</span>
      <span class="cat-count" id="count-service">0</span>
    </button>
    <button class="cat-btn" data-type="study">
      <span class="cat-icon">📚</span>
      <span class="cat-label">学习</span>
      <span class="cat-count" id="count-study">0</span>
    </button>
    <button class="cat-btn" data-type="entertainment">
      <span class="cat-icon">🎮</span>
      <span class="cat-label">娱乐</span>
      <span class="cat-count" id="count-entertainment">0</span>
    </button>
    <button class="cat-btn" data-type="other">
      <span class="cat-icon">📌</span>
      <span class="cat-label">其他</span>
      <span class="cat-count" id="count-other">0</span>
    </button>
  </aside>

  <!-- ====== Map ====== -->
  <main id="map-container">
    <div id="map"></div>

    <!-- Add Mode Indicator -->
    <div id="add-mode-banner" class="hidden">
      <span>🎯 点击地图上的位置来添加新地点</span>
      <button id="cancel-add">取消</button>
    </div>

    <!-- Legend -->
    <div id="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#e74c3c"></span>美食</div>
      <div class="legend-item"><span class="legend-dot" style="background:#3498db"></span>购物</div>
      <div class="legend-item"><span class="legend-dot" style="background:#2ecc71"></span>生活</div>
      <div class="legend-item"><span class="legend-dot" style="background:#9b59b6"></span>学习</div>
      <div class="legend-item"><span class="legend-dot" style="background:#f39c12"></span>娱乐</div>
    </div>
  </main>

  <!-- ====== Floating Action Buttons ====== -->
  <div id="fab-group">
    <button id="btn-add-place" title="添加地点">
      <span>➕</span>
    </button>
    <button id="btn-export" title="导出数据">
      <span>💾</span>
    </button>
    <button id="btn-my-location" title="定位到我的位置">
      <span>📍</span>
    </button>
  </div>

  <!-- ====== Add Place Modal ====== -->
  <div id="modal-overlay" class="hidden">
    <div id="add-modal">
      <h2>✨ 添加新地点</h2>

      <label for="modal-type">类型</label>
      <select id="modal-type">
        <option value="food">🍜 美食</option>
        <option value="shopping">🛒 购物</option>
        <option value="service">🏪 生活服务</option>
        <option value="study">📚 学习</option>
        <option value="entertainment">🎮 娱乐</option>
        <option value="other">📌 其他</option>
      </select>

      <label for="modal-name">名称 *</label>
      <input type="text" id="modal-name" placeholder="比如：小四川餐厅" maxlength="50" />

      <label for="modal-note">备注</label>
      <textarea id="modal-note" placeholder="推荐理由、必点菜品、人均价格..." rows="3" maxlength="200"></textarea>

      <div class="modal-coords">
        <span id="modal-coords-display">点击地图选择位置</span>
      </div>

      <div class="modal-buttons">
        <button id="modal-cancel" class="btn-secondary">取消</button>
        <button id="modal-save" class="btn-primary">保存地点</button>
      </div>
    </div>
  </div>

  <!-- ====== Place Detail Panel (slide-up) ====== -->
  <div id="detail-panel" class="hidden">
    <div id="detail-handle"></div>
    <div id="detail-content">
      <h3 id="detail-name"></h3>
      <span id="detail-type-badge" class="type-badge"></span>
      <p id="detail-note"></p>
      <div id="detail-actions">
        <button id="detail-navigate" class="btn-primary">🗺️ 导航到这里</button>
        <button id="detail-delete" class="btn-danger hidden">🗑️ 删除</button>
      </div>
    </div>
  </div>

  <!-- ====== Toast ====== -->
  <div id="toast" class="hidden"></div>

  <!-- ====== Scripts ====== -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.js"></script>

  <script src="js/storage.js"></script>
  <script src="js/routing.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/search.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>

  <!-- Register Service Worker (PWA offline support) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(function() {
        console.log('SW registered ✅');
      }).catch(function(err) {
        console.log('SW registration skipped:', err.message);
      });
    }
  </script>
</body>
</html>
