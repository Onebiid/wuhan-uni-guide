<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>武大美食生活地图 💕</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e74c3c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WHU生活" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="css/style.css" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💕</text></svg>">
</head>
<body>

  <!-- ====== Top Bar ====== -->
  <header id="top-bar">
    <h1 id="site-title">武大生活地图</h1>
    <div id="search-box">
      <input type="text" id="search-input" placeholder="搜索地点、美食、设施..." autocomplete="off" />
      <button id="search-clear" title="清除">&times;</button>
    </div>
    <div id="search-results" class="hidden"></div>
  </header>

  <!-- ====== Category Filter Sidebar ====== -->
  <aside id="category-bar">
    <button class="cat-btn active" data-type="all">
      <span class="cat-dot"></span>
      <span class="cat-label">全部</span>
      <span class="cat-count" id="count-all">0</span>
    </button>
    <button class="cat-btn" data-type="food">
      <span class="cat-dot"></span>
      <span class="cat-label">美食</span>
      <span class="cat-count" id="count-food">0</span>
    </button>
    <button class="cat-btn" data-type="shopping">
      <span class="cat-dot"></span>
      <span class="cat-label">购物</span>
      <span class="cat-count" id="count-shopping">0</span>
    </button>
    <button class="cat-btn" data-type="service">
      <span class="cat-dot"></span>
      <span class="cat-label">生活</span>
      <span class="cat-count" id="count-service">0</span>
    </button>
    <button class="cat-btn" data-type="study">
      <span class="cat-dot"></span>
      <span class="cat-label">学习</span>
      <span class="cat-count" id="count-study">0</span>
    </button>
    <button class="cat-btn" data-type="entertainment">
      <span class="cat-dot"></span>
      <span class="cat-label">娱乐</span>
      <span class="cat-count" id="count-entertainment">0</span>
    </button>
    <button class="cat-btn" data-type="other">
      <span class="cat-dot"></span>
      <span class="cat-label">其他</span>
      <span class="cat-count" id="count-other">0</span>
    </button>
    <!-- Separator: functional categories ↑ | personal ↓ -->
    <div class="cat-separator"></div>
    <button class="cat-btn cat-btn-special" data-type="memory">
      <span class="cat-dot cat-dot-special"></span>
      <span class="cat-label">我们</span>
      <span class="cat-count cat-count-special" id="count-memory">0</span>
    </button>
  </aside>

  <!-- ====== Map ====== -->
  <main id="map-container">
    <div id="map"></div>

    <!-- Add Mode Indicator -->
    <div id="add-mode-banner" class="hidden">
      <span>点击地图上的位置来添加新地点</span>
      <button id="cancel-add">取消</button>
    </div>

    <!-- Edit Mode Indicator -->
    <div id="edit-mode-banner" class="hidden">
      <span>编辑模式 — 拖动标记移动位置，点击标记修改信息</span>
      <button id="cancel-edit">完成</button>
    </div>

  </main>

  <!-- ====== Floating Action Buttons ====== -->
  <div id="fab-group">
    <button id="btn-add-place" title="添加地点">
      <span>+</span>
    </button>
    <button id="btn-edit-place" title="编辑地点">
      <span>✎</span>
    </button>
    <button id="btn-sync-now" title="同步到云端">
      <span>☁️</span>
    </button>
    <button id="btn-reload-map" title="刷新地图瓦片">
      <span>↻</span>
    </button>
    <button id="btn-import" title="导入数据">
      <span>↑</span>
    </button>
    <button id="btn-export" title="导出数据">
      <span>↓</span>
    </button>
    <button id="btn-my-location" title="定位到我的位置">
      <span>◎</span>
    </button>
  </div>

  <!-- ====== Add Place Modal ====== -->
  <div id="modal-overlay" class="hidden">
    <div id="add-modal">
      <h2 id="modal-title">✨ 添加新地点</h2>

      <label for="modal-type">类型</label>
      <select id="modal-type">
        <option value="food">美食</option>
        <option value="shopping">购物</option>
        <option value="service">生活服务</option>
        <option value="study">学习</option>
        <option value="entertainment">娱乐</option>
        <option value="memory">🎓 我们</option>
        <option value="other">其他</option>
      </select>

      <label for="modal-name">名称 *</label>
      <input type="text" id="modal-name" placeholder="比如：小四川餐厅" maxlength="50" />

      <label for="modal-note">备注</label>
      <textarea id="modal-note" placeholder="推荐理由、必点菜品、人均价格..." rows="3" maxlength="200"></textarea>

      <label for="modal-photo">📷 照片（可选，最多9张）</label>
      <div class="modal-photo-area">
        <input type="file" id="modal-photo" accept="image/*" multiple />
        <div id="modal-photo-preview" class="photo-preview-strip hidden"></div>
        <div id="modal-photo-count" class="photo-count-hint hidden">已选 0/9 张</div>
      </div>

      <div class="modal-coords">
        <span id="modal-coords-display">点击地图选择位置</span>
      </div>

      <div class="modal-buttons">
        <button id="modal-cancel" class="btn-secondary">取消</button>
        <button id="modal-save" class="btn-primary">保存地点</button>
      </div>
    </div>
  </div>

  <!-- ====== Place Detail Panel (slide-up) ====== -->
  <div id="detail-panel" class="hidden">
    <div id="detail-handle"></div>
    <div id="detail-content">
      <h3 id="detail-name"></h3>
      <span id="detail-type-badge" class="type-badge"></span>
      <div id="detail-photo-carousel" class="photo-carousel hidden">
        <div class="photo-carousel-viewport">
          <div class="photo-carousel-track" id="carousel-track"></div>
        </div>
        <button id="carousel-prev" class="carousel-nav carousel-prev" aria-label="上一张">&lsaquo;</button>
        <button id="carousel-next" class="carousel-nav carousel-next" aria-label="下一张">&rsaquo;</button>
        <div class="photo-carousel-dots" id="carousel-dots"></div>
      </div>
      <p id="detail-note"></p>
      <div id="detail-actions">
        <button id="detail-photo-edit" class="btn-photo-edit hidden">📷 添加照片</button>
        <input type="file" id="detail-photo-input" class="hidden" accept="image/*" />
        <button id="detail-edit" class="btn-secondary">✏️ 编辑</button>
        <button id="detail-navigate" class="btn-primary">🗺️ 导航到这里</button>
        <button id="detail-delete" class="btn-danger hidden">🗑️ 删除</button>
      </div>
    </div>
  </div>

  <!-- ====== Memory Overlay (photo surprise) ====== -->
  <div id="memory-overlay" class="hidden">
    <div class="memory-backdrop"></div>
    <button id="memory-close" aria-label="关闭">✕</button>
    <div class="memory-stage">
      <div class="memory-photo-frame">
        <img id="memory-photo" src="" alt="" />
      </div>
      <div class="memory-text-box" id="memory-text"></div>
    </div>
    <div id="memory-hearts"></div>
  </div>

  <!-- ====== Love Counter ====== -->
  <div id="love-counter">
    <span class="love-counter-icon">💕</span>
    <span id="love-counter-text">我们在一起已经 ...</span>
  </div>

  <!-- ====== Music Player ====== -->
  <button id="btn-music" title="音乐播放器">🎵</button>
  <div id="music-player" class="hidden">
    <div class="player-top">
      <span id="player-song-title" class="player-song-title">未选择歌曲</span>
      <div id="player-time" class="player-time">--:-- / --:--</div>
    </div>
    <input type="range" id="player-progress" class="player-progress" min="0" max="100" value="0" />
    <div class="player-controls">
      <button id="player-prev" title="上一首">⏮</button>
      <button id="player-play" title="播放/暂停">▶️</button>
      <button id="player-next" title="下一首">⏭</button>
      <button id="player-playlist-btn" title="播放列表">📋</button>
      <div class="player-volume-wrap">
        <span>🔊</span>
        <input type="range" id="player-volume" class="player-volume" min="0" max="100" value="50" />
      </div>
    </div>
    <!-- Playlist panel -->
    <div id="playlist-panel" class="hidden">
      <div class="playlist-add">
        <input type="text" id="add-song-url" placeholder="歌曲 URL (网易云/QQ音乐外链)" />
        <input type="text" id="add-song-title" placeholder="歌名" />
        <button id="add-song-btn">+ 添加</button>
      </div>
      <div class="playlist-add-local">
        <button id="add-local-file-btn">📁 上传本地音乐</button>
        <input type="file" id="local-file-input" class="hidden" accept="audio/*,.mp3,.wav,.ogg,.flac,.aac,.m4a" multiple />
      </div>
      <div id="playlist-list" class="playlist-list"></div>
    </div>
  </div>

  <!-- ====== Cloud Sync Settings Panel ====== -->
  <div id="cloud-settings-overlay" class="hidden">
    <div id="cloud-settings-panel">
      <div class="cloud-settings-header">
        <h3>☁️ 云同步设置</h3>
        <button id="cloud-settings-close">&times;</button>
      </div>
      <p class="cloud-settings-hint">
        使用 <a href="https://leancloud.cn" target="_blank">LeanCloud</a> 作为云存储后端，无需 VPN。<br>
        注册后在「设置 → App Keys」中获取密钥。
      </p>
      <label for="cloud-app-id">App ID</label>
      <input type="text" id="cloud-app-id" placeholder="粘贴你的 LeanCloud App ID..." />
      <label for="cloud-app-key">App Key</label>
      <input type="password" id="cloud-app-key" placeholder="粘贴你的 LeanCloud App Key..." />
      <label for="cloud-region">区域</label>
      <select id="cloud-region">
        <option value="lc-cn-n1-shared">华北 (lc-cn-n1-shared)</option>
        <option value="lc-cn-e1-shared">华东 (lc-cn-e1-shared)</option>
      </select>
      <div class="cloud-settings-buttons">
        <button id="cloud-settings-test" class="btn-secondary">🔍 测试连接</button>
        <button id="cloud-settings-save" class="btn-primary">💾 保存设置</button>
      </div>
      <div id="cloud-status" class="cloud-status"></div>
    </div>
  </div>

  <!-- ====== Surprise (anniversary easter egg) ====== -->
  <div id="petal-storm" class="hidden"></div>
  <div id="surprise-card" class="hidden">
    <div class="surprise-card-inner">
      <span class="surprise-icon">💌</span>
      <p id="surprise-message"></p>
      <button id="surprise-dismiss">收下我的心意</button>
    </div>
  </div>

  <!-- ====== Toast ====== -->
  <div id="toast" class="hidden"></div>

  <!-- ====== Scripts ====== -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="js/cloud-sync.js"></script>
  <script src="js/image-utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/routing.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/search.js"></script>
  <script src="js/memory.js"></script>
  <script src="js/love-counter.js"></script>
  <script src="js/surprise.js"></script>
  <script src="js/music-player.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>

  <!-- Register Service Worker (PWA offline support) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(function() {
        console.log('SW registered ✅');
      }).catch(function(err) {
        console.log('SW registration skipped:', err.message);
      });
    }
  </script>
</body>
</html>
